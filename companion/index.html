<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f23">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BMAD Board">
  <title>BMAD Board</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <button id="btn-back" class="btn-icon hidden" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 id="header-title">BMAD Board</h1>
      </div>
      <div class="header-right">
        <span id="connection-dot" class="dot dot-disconnected" title="Disconnected"></span>
        <button id="btn-refresh" class="btn-icon" aria-label="Refresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content area -->
    <main id="main">
      <!-- Connect screen (shown when no connection) -->
      <section id="view-connect" class="view">
        <div class="connect-box">
          <div class="connect-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg>
          </div>
          <h2>Connect to BMAD Board</h2>
          <p class="text-muted">Scan the QR code in your desktop app's settings, or enter the connection URL below.</p>
          <input id="input-url" type="url" placeholder="http://192.168.x.x:3939?token=..." autocomplete="off" spellcheck="false">
          <button id="btn-connect" class="btn-primary">Connect</button>
          <p id="connect-error" class="error hidden"></p>
        </div>
      </section>

      <!-- Dashboard (epics overview) -->
      <section id="view-dashboard" class="view hidden">
        <div class="project-header">
          <h2 id="project-name">Project</h2>
          <p id="project-meta" class="text-muted"></p>
        </div>
        <div id="epics-grid" class="epics-grid"></div>
      </section>

      <!-- Epic detail (stories) -->
      <section id="view-epic" class="view hidden">
        <div class="epic-header">
          <span id="epic-status" class="phase-pill"></span>
          <h2 id="epic-title">Epic</h2>
        </div>
        <div id="stories-list" class="stories-list"></div>
      </section>

      <!-- Terminal -->
      <section id="view-terminal" class="view hidden">
        <div id="terminal-container">
          <div class="terminal-toolbar">
            <button id="btn-terminal-mode" class="btn-mode hidden" title="Toggle terminal mode">Own</button>
          </div>
          <div id="terminal-output"></div>
          <div class="terminal-input-row">
            <input id="terminal-input" type="text" placeholder="Type command..." autocomplete="off" autocapitalize="off" spellcheck="false">
            <button id="btn-send" class="btn-icon" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom navigation -->
    <nav id="nav">
      <button class="nav-item active" data-view="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Board</span>
      </button>
      <button class="nav-item" data-view="terminal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span>Terminal</span>
      </button>
    </nav>
  </div>

  <script src="/app.js"></script>
</body>
</html>
